name: Run Telegram Bot

on:
  workflow_dispatch:
  schedule:
    - cron: '0 * * * *'   # Job A: starts at :00, runs 58 min, dies at :58
    - cron: '55 * * * *'  # Job B: starts at :55, runs 58 min → overlaps Job A last 3 min

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 58

    steps:
      - uses: actions/checkout@v3

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run bot
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GROQ_API_KEY_2: ${{ secrets.GROQ_API_KEY_2 }}
          GROQ_API_KEY_3: ${{ secrets.GROQ_API_KEY_3 }}
          GROQ_API_KEY_4: ${{ secrets.GROQ_API_KEY_4 }}
          GROQ_API_KEY_5: ${{ secrets.GROQ_API_KEY_5 }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_API_KEY_2: ${{ secrets.GEMINI_API_KEY_2 }}
          CEREBRAS_API_KEY: ${{ secrets.CEREBRAS_API_KEY }}
          CEREBRAS_API_KEY_2: ${{ secrets.CEREBRAS_API_KEY_2 }}
          CEREBRAS_API_KEY_3: ${{ secrets.CEREBRAS_API_KEY_3 }}
          SAMBANOVA_API_KEY: ${{ secrets.SAMBANOVA_API_KEY }}
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
          STABLE_HORDE_API_KEY: ${{ secrets.STABLE_HORDE_API_KEY }}
          ADMIN_ID: ${{ secrets.ADMIN_ID }}
          TURSO_URL: ${{ secrets.TURSO_URL }}
          TURSO_TOKEN: ${{ secrets.TURSO_TOKEN }}
        run: python bot.py
