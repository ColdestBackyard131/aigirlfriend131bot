name: Run Telegram Bot

on:
  workflow_dispatch:
  schedule:
    - cron: '0 * * * *'    # starts at :00 every hour
    - cron: '55 * * * *'   # starts at :55 — 1 min before previous exits at :55

concurrency:
  group: telegram-bot
  cancel-in-progress: false  # new job queues, old job exits at 55min, new takes over

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 58

    steps:
      - uses: actions/checkout@v4.2.2

      - name: Set up Python 3.11
        uses: actions/setup-python@v5.6.0
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run bot
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          STABLE_HORDE_API_KEY: ${{ secrets.STABLE_HORDE_API_KEY }}
          ADMIN_ID: ${{ secrets.ADMIN_ID }}
          TURSO_URL: ${{ secrets.TURSO_URL }}
          TURSO_TOKEN: ${{ secrets.TURSO_TOKEN }}
        run: python bot.py || true
